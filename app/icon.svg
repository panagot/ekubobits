<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ekubobits">
  <defs>
    <linearGradient id="ekubo-accent" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5eead4"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <!-- Rounded tile -->
  <rect width="32" height="32" rx="8" fill="#0f1419"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="7" fill="none" stroke="#243040" stroke-width="1"/>
  <!-- Eight call-point cells in two rows -->
  <g fill="url(#ekubo-accent)">
    <rect x="6" y="8" width="4.5" height="4.5" rx="1"/>
    <rect x="18.5" y="8" width="4.5" height="4.5" rx="1"/>
    <rect x="12.25" y="8" width="4.5" height="4.5" rx="1" opacity="0.35"/>
    <rect x="25" y="8" width="4.5" height="4.5" rx="1" opacity="0.25"/>
    <rect x="6" y="17.5" width="4.5" height="4.5" rx="1"/>
    <rect x="18.5" y="17.5" width="4.5" height="4.5" rx="1"/>
    <rect x="12.25" y="17.5" width="4.5" height="4.5" rx="1" opacity="0.35"/>
    <rect x="25" y="17.5" width="4.5" height="4.5" rx="1" opacity="0.25"/>
  </g>
</svg>
